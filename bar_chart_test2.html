<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRMC Funding Gap Dashboard</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --border-color: rgba(0,0,0,0.15);
    --grid-color: rgba(0,0,0,0.06);
    --text-chart: rgba(0,0,0,0.75);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2a2a2a;
      --text-primary: #e5e5e5;
      --text-secondary: #999;
      --border-color: rgba(255,255,255,0.15);
      --grid-color: rgba(255,255,255,0.08);
      --text-chart: rgba(255,255,255,0.85);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 2rem; }
  .slicer-row { display: flex; gap: 24px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .slicer { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px 16px; min-width: 200px; }
  .slicer-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
  .slicer label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-primary); padding: 4px 0; cursor: pointer; }
  .slicer input[type="checkbox"] { width: 16px; height: 16px; accent-color: #534AB7; cursor: pointer; }
  .kpi-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .kpi { background: var(--bg-secondary); border-radius: 8px; padding: 1rem; }
  .kpi-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .kpi-val { font-size: 24px; font-weight: 500; }
  .kpi-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary); }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .section { margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; }
  .section-head { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; }
</style>
</head>
<body>

  <div class="slicer-row">
    <div class="slicer">
      <div class="slicer-title">Type of gap</div>
      <label><input type="checkbox" class="gap-filter" value="Critical" checked> Critical</label>
      <label><input type="checkbox" class="gap-filter" value="Risk Reduction" checked> Risk reduction</label>
      <label><input type="checkbox" class="gap-filter" value="Important" checked> Important</label>
    </div>
    <div class="slicer">
      <div class="slicer-title">Cost variance</div>
      <label><input type="checkbox" class="cv-filter" value="ROM" checked> ROM</label>
      <label><input type="checkbox" class="cv-filter" value="Proposed" checked> Proposed</label>
      <label><input type="checkbox" class="cv-filter" value="Active (Cost Growth)" checked> Active (cost growth)</label>
      <label><input type="checkbox" class="cv-filter" value="Directed Uncovered" checked> Directed uncovered</label>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-label">Total directed uncovered</div>
      <div class="kpi-val" id="kpi-unc" style="color: #D85A30;">—</div>
      <div class="kpi-sub" id="kpi-unc-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Proposed — not ROM</div>
      <div class="kpi-val" id="kpi-prop" style="color: #534AB7;">—</div>
      <div class="kpi-sub" id="kpi-prop-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Existing project cost growth</div>
      <div class="kpi-val" id="kpi-cg" style="color: #A32D2D;">—</div>
      <div class="kpi-sub" id="kpi-cg-sub"></div>
    </div>
  </div>

  <div class="legend">
    <span><i style="background: #D85A30;"></i>Directed uncovered</span>
    <span><i style="background: #534AB7;"></i>$ needed — proposed (not ROM)</span>
    <span><i style="background: #A32D2D;"></i>$ needed — existing cost growth</span>
  </div>

  <div style="position: relative; width: 100%; height: 400px;">
    <canvas id="groupedChart"></canvas>
  </div>

  <div class="section">
    <div class="section-head">POM $ requested by fiscal year</div>
    <table id="pomTable" style="width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px;">
      <thead>
        <tr style="border-bottom: 1px solid var(--border-color);">
          <th style="text-align: left; padding: 10px 12px; font-weight: 500; color: var(--text-secondary); font-size: 13px;">Fiscal year</th>
          <th style="text-align: right; padding: 10px 12px; font-weight: 500; color: var(--text-secondary); font-size: 13px;">POM $ requested</th>
        </tr>
      </thead>
      <tbody id="pomBody"></tbody>
      <tfoot>
        <tr style="border-top: 1px solid var(--border-color);">
          <td style="text-align: left; padding: 10px 12px; font-weight: 500;">Total</td>
          <td id="pomTotal" style="text-align: right; padding: 10px 12px; font-weight: 500;"></td>
        </tr>
      </tfoot>
    </table>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const tx = isDark ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.75)';
const gd = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
const fmtM = v => {
  if (Math.abs(v) >= 1000) return (v < 0 ? '-' : '') + '$' + (Math.abs(v) / 1000).toFixed(2) + 'B';
  const abs = Math.abs(v);
  const prefix = v < 0 ? '-' : '';
  if (abs < 10) return prefix + '$' + abs.toFixed(1) + 'M';
  return prefix + '$' + Math.round(abs) + 'M';
};

const fys = ['FY25','FY26','FY27','FY28','FY29'];
const gapTypes = ['Critical','Risk Reduction','Important'];
const cvTypes = ['ROM','Proposed','Active (Cost Growth)','Directed Uncovered'];
const dirTypes = ['T&E infrastructure','Weapon system testing','Cyber test & eval','Modeling & sim','Live fire test'];

const records = [];
const rng = new Array(500).fill(0).map((_,i) => ((i * 9301 + 49297) % 233280) / 233280);
let ri = 0;
const sRng = (a,b) => Math.round(a + rng[ri++ % 500] * (b - a));

fys.forEach(fy => {
  gapTypes.forEach(gap => {
    cvTypes.forEach(cv => {
      dirTypes.forEach(dt => {
        const w = gap === 'Critical' ? 1.4 : gap === 'Risk Reduction' ? 1.0 : 0.7;
        const cvW = cv === 'Directed Uncovered' ? 1.3 : cv === 'Active (Cost Growth)' ? 1.1 : cv === 'ROM' ? 0.9 : 1.0;
        const fyW = 1 + (fys.indexOf(fy)) * 0.08;
        const base = sRng(1, 5) / 10;
        const uncovered = Math.round(base * w * cvW * fyW * 10) / 10;
        const proposed = Math.round(uncovered * (sRng(55, 75) / 100) * 10) / 10;
        const costGrowth = Math.round(uncovered * (sRng(30, 50) / 100) * 10) / 10;
        records.push({ fy, gap, cv, dt, uncovered, proposed, costGrowth });
      });
    });
  });
});

function getFiltered() {
  const gapSel = [...document.querySelectorAll('.gap-filter:checked')].map(c => c.value);
  const cvSel = [...document.querySelectorAll('.cv-filter:checked')].map(c => c.value);
  return records.filter(r => gapSel.includes(r.gap) && cvSel.includes(r.cv));
}

function aggregate(filtered) {
  const byFY = {};
  fys.forEach(f => { byFY[f] = { uncovered: 0, proposed: 0, costGrowth: 0 }; });
  const byType = {};
  dirTypes.forEach(d => { byType[d] = { uncovered: 0, proposed: 0, costGrowth: 0 }; });
  let totU = 0, totP = 0, totC = 0;
  filtered.forEach(r => {
    byFY[r.fy].uncovered += r.uncovered;
    byFY[r.fy].proposed += r.proposed;
    byFY[r.fy].costGrowth += r.costGrowth;
    byType[r.dt].uncovered += r.uncovered;
    byType[r.dt].proposed += r.proposed;
    byType[r.dt].costGrowth += r.costGrowth;
    totU += r.uncovered;
    totP += r.proposed;
    totC += r.costGrowth;
  });
  return { byFY, byType, totU, totP, totC, count: filtered.length };
}

const groupedChart = new Chart(document.getElementById('groupedChart'), {
  type: 'bar',
  data: {
    labels: fys,
    datasets: [
      { label: 'Directed uncovered', data: [0,0,0,0,0], backgroundColor: '#D85A30', borderRadius: 3, barPercentage: 0.85, categoryPercentage: 0.7 },
      { label: '$ needed — proposed (not ROM)', data: [0,0,0,0,0], backgroundColor: '#534AB7', borderRadius: 3, barPercentage: 0.85, categoryPercentage: 0.7 },
      { label: '$ needed — existing cost growth', data: [0,0,0,0,0], backgroundColor: '#A32D2D', borderRadius: 3, barPercentage: 0.85, categoryPercentage: 0.7 }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      x: { grid: { display: false }, ticks: { color: tx, font: { size: 13, weight: '500' }, autoSkip: false } },
      y: { beginAtZero: true, grid: { color: gd }, ticks: { color: tx, font: { size: 11 }, callback: v => '$' + v + 'M' } }
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        mode: 'index',
        callbacks: {
          label: c => c.dataset.label + ': ' + fmtM(c.raw),
          afterBody: items => {
            const t = items.reduce((s, it) => s + it.raw, 0);
            return ['─────────', 'Combined pressure: ' + fmtM(t)];
          }
        }
      }
    }
  },
  plugins: [{
    id: 'bar-labels',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      ctx.font = '500 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = tx;
      chart.data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        meta.data.forEach((bar, i) => {
          if (ds.data[i] > 0) ctx.fillText(fmtM(ds.data[i]), bar.x, bar.y - 6);
        });
      });
    }
  }]
});

const pomByFY = { FY25: 28.4, FY26: 31.2, FY27: 34.8, FY28: 38.5, FY29: 42.1 };

function updateTable(agg) {
  const body = document.getElementById('pomBody');
  const borderC = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  let html = '';
  let total = 0;
  fys.forEach(fy => {
    const pom = pomByFY[fy];
    total += pom;
    html += '<tr style="border-bottom: 0.5px solid ' + borderC + ';">';
    html += '<td style="padding: 10px 12px;">' + fy + '</td>';
    html += '<td style="text-align: right; padding: 10px 12px; font-variant-numeric: tabular-nums;">$' + pom.toFixed(1) + 'M</td>';
    html += '</tr>';
  });
  body.innerHTML = html;
  document.getElementById('pomTotal').textContent = '$' + total.toFixed(1) + 'M';
}

function updateAll() {
  const filtered = getFiltered();
  const agg = aggregate(filtered);

  document.getElementById('kpi-unc').textContent = fmtM(agg.totU);
  document.getElementById('kpi-unc-sub').textContent = agg.count + ' records matched';
  document.getElementById('kpi-prop').textContent = fmtM(agg.totP);
  document.getElementById('kpi-prop-sub').textContent = 'New efforts to close gaps';
  document.getElementById('kpi-cg').textContent = fmtM(agg.totC);
  document.getElementById('kpi-cg-sub').textContent = 'Programs exceeding budget';

  const uncArr = fys.map(f => agg.byFY[f].uncovered);
  const propArr = fys.map(f => agg.byFY[f].proposed);
  const cgArr = fys.map(f => agg.byFY[f].costGrowth);
  const maxVal = Math.max(...uncArr, ...propArr, ...cgArr, 10);

  groupedChart.data.datasets[0].data = uncArr;
  groupedChart.data.datasets[1].data = propArr;
  groupedChart.data.datasets[2].data = cgArr;
  groupedChart.options.scales.y.max = Math.ceil(maxVal * 1.2 / 10) * 10;
  groupedChart.update();

  updateTable(agg);
}

document.querySelectorAll('.gap-filter, .cv-filter').forEach(cb => {
  cb.addEventListener('change', updateAll);
});

updateAll();
</script>
</body>
</html>
